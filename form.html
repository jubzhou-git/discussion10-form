<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample Form</title>
  <link rel="stylesheet" href="css/style.css"/>

</head>
<body>
    <main>
        <h1>Groceries Pickup Form</h1>
    <form action="https://formspree.io/f/mojkrpgj" method="POST">
        <fieldset>
            <legend>Information</legend>
            <label for="first-name">First Name *:</label>
            <input type="text" id="first-name" name="first-name" required>

            <label for="last-name">Last Name *:</label>
            <input type="text"  id="last-name" name="last-name" required>

            <label for="program">Confirm MSI Program: </label>
            <input type="checkbox" id="program" name="program">

            <fieldset class="checkbox-group">
                <legend>Available Times for Picking Up Groceries:</legend>
                <input type="checkbox" id="morning" name="available-time-1" value="morning">
                <label for="morning">Morning</label>

                <input type="checkbox" id="afternoon" name="available-time-2" value="afternoon">
                <label for="afternoon">Afternoon</label>

                <input type="checkbox" id="evening" name="available-time-3" value="evening">
                <label for="evening">Evening</label>

                <input type="checkbox" id="weekend" name="available-time-4" value="weekend">
                <label for="weekend">Weekend</label>
            </fieldset>

            <input type="submit" value="Submit">
        </fieldset>
    </form>
    </main>
</body>
</html>
